describe: |
  Deposited 50 nm ionomer on 15 nm copper on 3 nm titanium on silicon,
  measured in D2O.
  Neutrons enter from the silicon side.
  D2O interface can be large, up to 10 nm.
  The ionomer can swell up to 200 nm in water, and its SLD can be up to 5 in D2O.
  The intensity is exptected to vary between 0.5 an 1.

states:
  # One state per physical sample condition. All files within a state
  # share ONE Sample stack; across states, structural parameters are
  # tied via shared_parameters (whitelist) or unshared_parameters
  # (blacklist — mutually exclusive).

  - name: run_226628                 # partials: 3 segments, one sample
    data:
      - Rawdata/REFL_226628_1_226628_partial.txt
      - Rawdata/REFL_226628_2_226629_partial.txt
      - Rawdata/REFL_226628_3_226630_partial.txt
    theta_offset:      {init: 0.0, min: -0.02, max: 0.02}
    sample_broadening: {init: 0.0, min: 0.0, max: 0.05}

model_name: ionomer-D2O-226628